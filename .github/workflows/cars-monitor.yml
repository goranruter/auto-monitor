name: cars-monitor
on:
  schedule:
    - cron: '30 5-20 * * *' # every hour at :30, 07:30–22:30 Belgrade (UTC+2)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Install dependencies
        run: npm ci && npx playwright install chromium

      - name: Run cars monitor
        run: node scripts/monitor.js
        env:
          MONITOR_TYPE: cars
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL_CARS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit seen_cars.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase || true
          git stash pop || true
          git add seen_cars.json || true
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: update seen_cars.json"
            git push || (git pull --rebase && git push)
          fi
