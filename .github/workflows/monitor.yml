name: monitor
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5-21/2 * * *' # every 2 hours: 07:00,09:00,11:00,13:00,15:00,17:00,19:00,21:00,23:00 Belgrade (UTC+2)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Install dependencies
        run: npm ci && npx playwright install chromium

      - name: Run monitor
        run: node scripts/monitor.js
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit seen.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase || true
          git stash pop || true
          git add seen.json || true
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: update seen.json"
            git push || (git pull --rebase && git push)
          fi
