<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e1117; --surface: #161b22; --surface2: #1c2330;
      --border: #30363d; --accent: #238636; --accent-h: #2ea043;
      --danger: #da3633; --text: #e6edf3; --muted: #8b949e;
      --green: #3fb950; --yellow: #d29922; --red: #f85149; --blue: #58a6ff;
    }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; font-size:14px; line-height:1.5; }

    /* Header */
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:13px 22px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .logo { font-size:17px; font-weight:700; } .logo span { color:var(--blue); }
    .status-pill { display:flex; align-items:center; gap:7px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:600; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
    .dot.running { background:var(--green); box-shadow:0 0 0 3px rgba(63,185,80,.25); animation:blink 1.6s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    main { max-width:1200px; margin:0 auto; padding:22px 16px; }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:11px; margin-bottom:20px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .stat-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:5px; }
    .stat-value { font-size:24px; font-weight:700; line-height:1; }
    .stat-sub   { font-size:11px; color:var(--muted); margin-top:3px; }

    /* Settings card */
    .settings-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:18px; overflow:hidden; }
    .settings-toggle { width:100%; background:none; border:none; padding:13px 18px; display:flex; align-items:center; gap:9px; color:var(--text); cursor:pointer; font-size:13px; font-weight:600; }
    .settings-toggle:hover { background:var(--surface2); }
    .s-arrow { margin-left:auto; font-size:10px; color:var(--muted); transition:transform .2s; }
    .settings-toggle.open .s-arrow { transform:rotate(180deg); }
    .settings-body { border-top:1px solid var(--border); padding:18px; display:none; }
    .settings-body.open { display:block; }

    /* Param inputs */
    .param-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:11px; margin-bottom:18px; }
    .param-group label { display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:5px; }
    .param-group input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:7px 10px; color:var(--text); font-size:13px; outline:none; }
    .param-group input:focus { border-color:var(--blue); }
    .score-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .score-row label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); white-space:nowrap; }
    .score-row input[type=range] { flex:1; accent-color:var(--blue); }
    .score-val { font-size:14px; font-weight:700; color:var(--blue); min-width:26px; text-align:right; }

    /* Model browser */
    .model-browser-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .model-browser-header span { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); }
    .mb-btn { background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:3px 9px; font-size:11px; font-weight:600; color:var(--muted); cursor:pointer; }
    .mb-btn:hover { color:var(--text); }
    #sel-count { margin-left:auto; font-size:11px; color:var(--muted); }

    /* Brand list */
    .brands-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:8px; }

    .brand-block { background:var(--surface2); border:1px solid var(--border); border-radius:9px; overflow:hidden; }
    .brand-hdr {
      display:flex; align-items:center; gap:8px;
      padding:9px 12px; cursor:pointer;
      user-select:none;
    }
    .brand-hdr:hover { background:rgba(255,255,255,.03); }
    .brand-hdr input[type=checkbox] { accent-color:var(--blue); width:14px; height:14px; flex-shrink:0; cursor:pointer; }
    .brand-hdr-name { font-size:13px; font-weight:600; flex:1; }
    .brand-sel-count { font-size:10px; color:var(--blue); font-weight:700; min-width:18px; text-align:right; }
    .brand-arrow { font-size:9px; color:var(--muted); transition:transform .18s; }
    .brand-block.open .brand-arrow { transform:rotate(180deg); }

    .model-list { display:none; border-top:1px solid var(--border); padding:10px 12px 12px; }
    .brand-block.open .model-list { display:block; }
    .model-checkboxes { display:flex; flex-wrap:wrap; gap:6px; }
    .model-check-label {
      display:flex; align-items:center; gap:5px;
      background:var(--bg); border:1px solid var(--border);
      border-radius:6px; padding:4px 9px;
      font-size:12px; color:var(--muted);
      cursor:pointer; user-select:none;
      transition:background .12s, border-color .12s, color .12s;
    }
    .model-check-label:hover { color:var(--text); border-color:#444c56; }
    .model-check-label input { display:none; }
    .model-check-label.checked {
      background:rgba(88,166,255,.13);
      border-color:rgba(88,166,255,.45);
      color:var(--blue); font-weight:600;
    }

    /* Controls */
    .controls { display:flex; gap:9px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
    button { cursor:pointer; border:none; border-radius:7px; padding:9px 18px; font-size:13px; font-weight:600; transition:background .15s, opacity .15s; }
    #btn-run { background:var(--accent); color:#fff; }
    #btn-run:hover:not(:disabled) { background:var(--accent-h); }
    #btn-run:disabled { opacity:.5; cursor:not-allowed; }
    #btn-stop { background:var(--danger); color:#fff; display:none; }
    #btn-stop:hover { filter:brightness(1.1); }
    #btn-clear { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    #btn-clear:hover { color:var(--text); }
    #run-summary { font-size:12px; color:var(--muted); }

    /* Terminal */
    .terminal-wrap { background:#0d1117; border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:22px; }
    .terminal-hdr { background:var(--surface2); border-bottom:1px solid var(--border); padding:7px 13px; font-size:11px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:8px; }
    .tdots { display:flex; gap:5px; }
    .tdots span { width:10px; height:10px; border-radius:50%; }
    .tdots span:nth-child(1){background:#ff5f57} .tdots span:nth-child(2){background:#febc2e} .tdots span:nth-child(3){background:#28c840}
    #terminal { font-family:'Fira Code','SF Mono','Consolas',monospace; font-size:12px; padding:12px 15px; height:230px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
    .t-start{color:var(--blue);font-weight:700} .t-done{color:var(--green);font-weight:700} .t-error{color:var(--red)} .t-log{color:#adbac7} .t-time{color:var(--muted);font-size:10px;margin-right:6px}

    /* Deal cards */
    .sec-hdr { display:flex; align-items:baseline; gap:9px; margin-bottom:13px; }
    .sec-hdr h2 { font-size:15px; font-weight:700; }
    .badge { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:2px 9px; font-size:11px; color:var(--muted); }
    .upd { margin-left:auto; font-size:11px; color:var(--muted); }
    #deals-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:13px; }
    .deal-card { background:var(--surface); border:1px solid var(--border); border-radius:11px; overflow:hidden; transition:transform .15s, border-color .15s; }
    .deal-card:hover { transform:translateY(-2px); border-color:#444c56; }
    .deal-img { position:relative; height:160px; background:var(--surface2); overflow:hidden; }
    .deal-img img { width:100%; height:100%; object-fit:cover; }
    .deal-img .no-img { display:flex; align-items:center; justify-content:center; height:100%; color:var(--muted); font-size:30px; }
    .rb { position:absolute; top:8px; right:8px; border-radius:7px; padding:3px 9px; font-size:11px; font-weight:700; backdrop-filter:blur(4px); }
    .rb-ex{background:rgba(35,134,54,.9);color:#aff3be} .rb-go{background:rgba(63,185,80,.85);color:#0d1117}
    .rb-fa{background:rgba(100,100,110,.8);color:#e6edf3} .rb-hi{background:rgba(210,153,34,.9);color:#0d1117} .rb-vh{background:rgba(218,54,51,.9);color:#ffc8c8}
    .sb { position:absolute; top:8px; left:8px; background:rgba(13,17,23,.8); border:1px solid var(--border); border-radius:7px; padding:3px 9px; font-size:11px; font-weight:700; backdrop-filter:blur(4px); }
    .deal-body { padding:12px; }
    .deal-title { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .deal-sub   { font-size:11px; color:var(--muted); margin-bottom:8px; }
    .price-row  { display:flex; align-items:baseline; gap:7px; margin-bottom:8px; }
    .price      { font-size:19px; font-weight:800; color:var(--green); }
    .median     { font-size:11px; color:var(--muted); }
    .saving     { margin-left:auto; font-size:12px; font-weight:700; color:var(--green); }
    .equip-row  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
    .ec { background:rgba(88,166,255,.12); border:1px solid rgba(88,166,255,.25); border-radius:5px; padding:2px 6px; font-size:10px; font-weight:600; color:var(--blue); }
    .ec.dmg { background:rgba(218,54,51,.12); border-color:rgba(218,54,51,.3); color:var(--red); }
    .deal-link { display:block; text-align:center; background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:6px; font-size:12px; font-weight:600; color:var(--blue); text-decoration:none; }
    .deal-link:hover { background:rgba(88,166,255,.1); border-color:rgba(88,166,255,.4); }
    .empty-state { grid-column:1/-1; padding:44px 0; text-align:center; color:var(--muted); }
    .empty-state .icon { font-size:38px; margin-bottom:10px; }

    ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
    @media(max-width:600px){ header{padding:10px 13px} main{padding:13px 9px} #deals-grid{grid-template-columns:1fr} .brands-list{grid-template-columns:1fr} }
  </style>
</head>
<body>
<header>
  <div class="logo">🚗 Auto<span>Monitor</span></div>
  <div class="status-pill"><div class="dot" id="dot"></div><span id="status-txt">Idle</span></div>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Deals Found</div><div class="stat-value" id="s-deals">—</div><div class="stat-sub">this run</div></div>
    <div class="stat-card"><div class="stat-label">Models Checked</div><div class="stat-value" id="s-models">—</div><div class="stat-sub">last run</div></div>
    <div class="stat-card"><div class="stat-label">Best Saving</div><div class="stat-value" id="s-saving" style="color:var(--green)">—</div><div class="stat-sub">vs market median</div></div>
    <div class="stat-card"><div class="stat-label">Last Run</div><div class="stat-value" id="s-time" style="font-size:15px;padding-top:5px">—</div><div class="stat-sub" id="s-date">no data yet</div></div>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <button class="settings-toggle" id="stoggle">⚙️ Run Settings <span class="s-arrow">▼</span></button>
    <div class="settings-body" id="sbody">

      <div class="param-row">
        <div class="param-group"><label>Min Price (€)</label><input type="number" id="p-minprice" value="3000" min="0" step="500"></div>
        <div class="param-group"><label>Max Price (€)</label><input type="number" id="p-maxprice" value="20000" min="0" step="500"></div>
        <div class="param-group"><label>Min Year <span style="font-weight:400;text-transform:none">(optional)</span></label><input type="number" id="p-minyear" placeholder="e.g. 2015" min="2000" max="2030"></div>
        <div class="param-group"><label>Max Year <span style="font-weight:400;text-transform:none">(optional)</span></label><input type="number" id="p-maxyear" placeholder="e.g. 2022" min="2000" max="2030"></div>
      </div>

      <div class="score-row">
        <label>Min Deal Score</label>
        <input type="range" id="p-score" min="70" max="100" value="80">
        <span class="score-val" id="score-lbl">80</span>
      </div>

      <div class="model-browser-header">
        <span>Select Models</span>
        <button class="mb-btn" onclick="selectAll()">Select All</button>
        <button class="mb-btn" onclick="clearAll()">Clear All</button>
        <span id="sel-count">All models (no filter)</span>
      </div>

      <div class="brands-list" id="brands-list"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="btn-run">▶ Run Monitor Now</button>
    <button id="btn-stop">⏹ Stop</button>
    <button id="btn-clear">Clear Log</button>
    <span id="run-summary"></span>
  </div>

  <!-- Terminal -->
  <div class="terminal-wrap">
    <div class="terminal-hdr"><div class="tdots"><span></span><span></span><span></span></div>LIVE LOG</div>
    <div id="terminal"><span style="color:var(--muted)">Waiting for run…</span></div>
  </div>

  <!-- Deals -->
  <div class="sec-hdr">
    <h2>Latest Deals</h2>
    <span class="badge" id="deals-badge">0</span>
    <span class="upd" id="upd-hint"></span>
  </div>
  <div id="deals-grid">
    <div class="empty-state"><div class="icon">🔍</div><div>No results yet — configure and click <strong>Run Monitor Now</strong>.</div></div>
  </div>
</main>

<script>
/* ── Brand / model data ───────────────────────────────── */
const BRANDS = [
  { brand:'volkswagen',   label:'Volkswagen',    models:['Golf','Passat','Polo','Tiguan','Touareg','Touran','Sharan','T-Roc','Caddy','Arteon','ID.3','ID.4'] },
  { brand:'bmw',          label:'BMW',           models:['Serija-1','Serija-2','Serija-3','Serija-4','Serija-5','Serija-7','X1','X2','X3','X4','X5','X6','Z4'] },
  { brand:'mercedes-benz',label:'Mercedes-Benz', models:['A-Klasa','B-Klasa','C-Klasa','E-Klasa','S-Klasa','GLA','GLB','GLC','GLE','GLK','CLA','CLS'] },
  { brand:'audi',         label:'Audi',          models:['A1','A3','A4','A5','A6','A7','A8','Q2','Q3','Q5','Q7','Q8','TT','E-Tron'] },
  { brand:'skoda',        label:'Škoda',         models:['Fabia','Octavia','Superb','Kodiaq','Karoq','Kamiq','Scala','Rapid','Enyaq'] },
  { brand:'seat',         label:'SEAT',          models:['Ibiza','Leon','Arona','Ateca','Tarraco','Toledo'] },
  { brand:'opel',         label:'Opel',          models:['Astra','Insignia','Corsa','Meriva','Zafira','Mokka','Crossland','Grandland','Vectra'] },
  { brand:'ford',         label:'Ford',          models:['Focus','Mondeo','Fiesta','Kuga','Puma','Edge','S-Max','Galaxy','Mustang'] },
  { brand:'renault',      label:'Renault',       models:['Megane','Clio','Laguna','Kadjar','Captur','Scenic','Talisman','Fluence','Zoe'] },
  { brand:'peugeot',      label:'Peugeot',       models:['208','308','408','508','2008','3008','5008','4008','Partner'] },
  { brand:'toyota',       label:'Toyota',        models:['Corolla','Auris','Avensis','RAV4','Yaris','Camry','C-HR','Hilux','Land Cruiser','Prius'] },
  { brand:'hyundai',      label:'Hyundai',       models:['i20','i30','i40','Tucson','ix35','Santa Fe','Ioniq','Kona','Elantra'] },
  { brand:'kia',          label:'Kia',           models:['Ceed','Sportage','Sorento','Picanto','Stinger','Optima','Niro','Stonic','ProCeed'] },
  { brand:'nissan',       label:'Nissan',        models:['Qashqai','Juke','X-Trail','Micra','Leaf','Navara','Murano','350Z','Pathfinder'] },
  { brand:'honda',        label:'Honda',         models:['Civic','Accord','CR-V','HR-V','Jazz','FR-V','Legend'] },
  { brand:'mazda',        label:'Mazda',         models:['Mazda2','Mazda3','Mazda6','CX-3','CX-5','CX-7','CX-9','MX-5'] },
  { brand:'mitsubishi',   label:'Mitsubishi',    models:['Outlander','Eclipse Cross','Pajero','Lancer','Galant','ASX','Colt','Eclipse'] },
  { brand:'jeep',         label:'Jeep',          models:['Compass','Renegade','Cherokee','Grand Cherokee','Wrangler','Gladiator'] },
  { brand:'citroen',      label:'Citroën',       models:['C3','C4','C5','C3 Aircross','C5 Aircross','Berlingo','Picasso','C-Elysee'] },
  { brand:'fiat',         label:'Fiat',          models:['Tipo','Punto','500','Bravo','Doblo','Freemont','Stilo','Linea','Panda'] },
  { brand:'alfa-romeo',   label:'Alfa Romeo',    models:['Giulia','Stelvio','147','156','159','Giulietta','Spider','Brera'] },
  { brand:'volvo',        label:'Volvo',         models:['V40','V60','V70','V90','S60','S90','XC40','XC60','XC70','XC90'] },
  { brand:'land-rover',   label:'Land Rover',    models:['Discovery','Freelander','Range Rover','Defender','Evoque','Discovery Sport'] },
  { brand:'porsche',      label:'Porsche',       models:['Cayenne','Macan','Panamera','911','Boxster','Cayman'] },
  { brand:'subaru',       label:'Subaru',        models:['Forester','Outback','Impreza','XV','Legacy','BRZ','WRX'] },
  { brand:'suzuki',       label:'Suzuki',        models:['Vitara','Swift','SX4','Jimny','Grand Vitara','Baleno'] },
  { brand:'dacia',        label:'Dacia',         models:['Duster','Sandero','Logan','Spring','Lodgy','Dokker'] },
  { brand:'chevrolet',    label:'Chevrolet',     models:['Cruze','Aveo','Captiva','Spark','Malibu','Trax','Orlando'] },
  { brand:'lancia',       label:'Lancia',        models:['Ypsilon','Delta','Lybra','Thesis','Musa'] },
  { brand:'lexus',        label:'Lexus',         models:['IS','ES','GS','LS','NX','RX','UX','CT'] },
  { brand:'infiniti',     label:'Infiniti',      models:['Q30','Q50','Q70','QX30','QX50','QX70','FX'] },
  { brand:'mini',         label:'MINI',          models:['Hatch','Clubman','Countryman','Paceman','Coupe','Roadster'] },
];

// Convert label → URL slug: "Grand Cherokee" → "grand-cherokee"
function toSlug(s) { return s.toLowerCase().replace(/[\s.]+/g,'-').replace(/[^a-z0-9-]/g,''); }

// key = "brand-model-slug", e.g. "volkswagen-golf", "mercedes-benz-c-klasa"
function modelKey(brandSlug, modelLabel) { return brandSlug + '-' + toSlug(modelLabel); }

/* ── Build accordion ──────────────────────────────────── */
const selected = new Set();

function buildBrands() {
  const list = document.getElementById('brands-list');
  list.innerHTML = BRANDS.map(b => {
    const id = b.brand;
    const models = b.models.map(m => {
      const key = modelKey(b.brand, m);
      return `<label class="model-check-label" id="lbl-${CSS.escape(key)}">
        <input type="checkbox" value="${key}" onchange="toggleModel('${key}',this)"> ${m}
      </label>`;
    }).join('');
    return `
<div class="brand-block" id="bb-${id}">
  <div class="brand-hdr" onclick="toggleBrand('${id}')">
    <input type="checkbox" id="bc-${id}" onclick="toggleBrandAll(event,'${id}')" title="Select all ${b.label}">
    <span class="brand-hdr-name">${b.label}</span>
    <span class="brand-sel-count" id="bsc-${id}"></span>
    <span class="brand-arrow">▼</span>
  </div>
  <div class="model-list"><div class="model-checkboxes">${models}</div></div>
</div>`;
  }).join('');
}

function toggleBrand(id) {
  document.getElementById('bb-'+id).classList.toggle('open');
}

function toggleBrandAll(e, brandSlug) {
  e.stopPropagation();
  const cb = e.target;
  const brand = BRANDS.find(b => b.brand === brandSlug);
  brand.models.forEach(m => {
    const key = modelKey(brandSlug, m);
    cb.checked ? selected.add(key) : selected.delete(key);
  });
  refreshUI();
}

function toggleModel(key, cb) {
  cb.checked ? selected.add(key) : selected.delete(key);
  refreshUI();
}

function refreshUI() {
  // sync individual checkboxes
  document.querySelectorAll('.model-check-label input').forEach(inp => {
    const checked = selected.has(inp.value);
    inp.checked = checked;
    inp.closest('.model-check-label').classList.toggle('checked', checked);
  });
  // sync brand-level checkboxes + counts
  BRANDS.forEach(b => {
    const keys = b.models.map(m => modelKey(b.brand, m));
    const cnt = keys.filter(k => selected.has(k)).length;
    const bcc = document.getElementById('bsc-'+b.brand);
    if (bcc) bcc.textContent = cnt > 0 ? cnt : '';
    const bc = document.getElementById('bc-'+b.brand);
    if (bc) { bc.indeterminate = cnt > 0 && cnt < keys.length; bc.checked = cnt === keys.length; }
  });
  // global count
  const n = selected.size;
  document.getElementById('sel-count').textContent = n === 0 ? 'All models (no filter)' : `${n} model${n>1?'a':''} odabrano`;
}

function selectAll() { BRANDS.forEach(b => b.models.forEach(m => selected.add(modelKey(b.brand,m)))); refreshUI(); }
function clearAll()  { selected.clear(); refreshUI(); }

buildBrands();

/* ── Settings toggle ──────────────────────────────────── */
document.getElementById('stoggle').addEventListener('click', () => {
  document.getElementById('stoggle').classList.toggle('open');
  document.getElementById('sbody').classList.toggle('open');
});

/* ── Score slider ─────────────────────────────────────── */
const scoreSlider = document.getElementById('p-score');
scoreSlider.addEventListener('input', () => { document.getElementById('score-lbl').textContent = scoreSlider.value; });

/* ── Helpers ──────────────────────────────────────────── */
function ratingClass(label) {
  if (!label) return '';
  const l = label.toLowerCase();
  if (l.includes('odlič'))  return 'rb-ex';
  if (l.includes('dobra'))  return 'rb-go';
  if (l.includes('fer'))    return 'rb-fa';
  if (l.includes('previs')) return 'rb-vh';
  if (l.includes('visoka')) return 'rb-hi';
  return 'rb-fa';
}
function fmtP(n) { return n == null ? '?' : Math.round(n).toLocaleString('de-DE') + ' €'; }
function equipChips(d) {
  const c = [];
  if (d.has4x4)            c.push('4x4');
  if (d.hasPanorama)       c.push('Panorama');
  if (d.hasLeather)        c.push('Koža');
  if (d.hasNavigation)     c.push('Navi');
  if (d.hasHeatedSeats)    c.push('Grejana sedišta');
  if (d.isFirstOwner)      c.push('1. vlasnik');
  if (d.hasServiceHistory) c.push('Servisna knjiga');
  return c;
}

/* ── Results ──────────────────────────────────────────── */
async function loadResults() {
  try { renderResults(await fetch('/api/results').then(r=>r.json())); } catch {}
}
function renderResults(data) {
  const deals = data.deals || [];
  document.getElementById('s-deals').textContent  = deals.length;
  document.getElementById('s-models').textContent = data.modelsChecked || '—';
  document.getElementById('deals-badge').textContent = deals.length;
  if (data.timestamp) {
    const d = new Date(data.timestamp);
    document.getElementById('s-time').textContent = d.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('s-date').textContent = d.toLocaleDateString('sr-RS',{day:'numeric',month:'short',year:'numeric'});
    document.getElementById('upd-hint').textContent = 'Updated '+d.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'});
  }
  const savings = deals.map(d=>(d.marketMedian||d.marketAvg||0)-d.price).filter(s=>s>0);
  if (savings.length) document.getElementById('s-saving').textContent='−'+Math.round(Math.max(...savings)).toLocaleString('de-DE')+' €';

  const grid = document.getElementById('deals-grid');
  if (!deals.length) { grid.innerHTML='<div class="empty-state"><div class="icon">🔍</div><div>No deals found in this run.</div></div>'; return; }
  const sorted = [...deals].sort((a,b)=>(b.dealScore||b.score||0)-(a.dealScore||a.score||0));
  grid.innerHTML = sorted.map(d => {
    const chips = equipChips(d);
    const median = d.marketMedian||d.marketAvg;
    const saving = median && d.price < median ? '−'+Math.round(median-d.price).toLocaleString('de-DE')+' €' : null;
    const score  = d.dealScore||d.score;
    return `
<div class="deal-card">
  <div class="deal-img">
    ${d.image?`<img src="${d.image}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="no-img" ${d.image?'style="display:none"':''}>🚗</div>
    ${score?`<div class="sb">⚡ ${score}</div>`:''}
    ${d.priceRating?`<div class="rb ${ratingClass(d.priceRating)}">${d.priceRating}</div>`:''}
  </div>
  <div class="deal-body">
    <div class="deal-title" title="${d.title||''}">${d.title||d.searchLabel||'—'}</div>
    <div class="deal-sub">${[d.year,d.km?d.km.toLocaleString('de-DE')+' km':null,d.fuel,d.transmission].filter(Boolean).join(' · ')}</div>
    <div class="price-row">
      <div class="price">${fmtP(d.price)}</div>
      ${median?`<div class="median">med. ${fmtP(median)}</div>`:''}
      ${saving?`<div class="saving">${saving}</div>`:''}
    </div>
    ${chips.length||d.hasAccident?`<div class="equip-row">${chips.map(c=>`<span class="ec">${c}</span>`).join('')}${d.hasAccident?'<span class="ec dmg">⚠ Havarisano</span>':''}</div>`:''}
    <a class="deal-link" href="${d.url || d.link || '#'}" target="_blank" rel="noopener">Pogledaj oglas →</a>
  </div>
</div>`;
  }).join('');
}

/* ── Terminal ─────────────────────────────────────────── */
const term = document.getElementById('terminal');
let autoScroll = true;
term.addEventListener('scroll', ()=>{ autoScroll = term.scrollTop+term.clientHeight >= term.scrollHeight-20; });
function termLine(type, text, time) {
  const row = document.createElement('div');
  if (time) { const ts=document.createElement('span'); ts.className='t-time'; ts.textContent=time; row.appendChild(ts); }
  const c=document.createElement('span'); c.className='t-'+type; c.textContent=text; row.appendChild(c);
  term.appendChild(row);
  if (autoScroll) term.scrollTop=term.scrollHeight;
}

/* ── Run / Stop ───────────────────────────────────────── */
let evt=null, running=false;
function setRunning(v) {
  running=v;
  document.getElementById('dot').className='dot'+(v?' running':'');
  document.getElementById('status-txt').textContent=v?'Running…':'Idle';
  document.getElementById('btn-run').disabled=v;
  document.getElementById('btn-stop').style.display=v?'inline-block':'none';
}

document.getElementById('btn-run').addEventListener('click', ()=>{
  if (running) return;
  const p = new URLSearchParams();
  const minP   = document.getElementById('p-minprice').value.trim();
  const maxP   = document.getElementById('p-maxprice').value.trim();
  const minYr  = document.getElementById('p-minyear').value.trim();
  const maxYr  = document.getElementById('p-maxyear').value.trim();
  const sc     = scoreSlider.value;
  if (minP)  p.set('minPrice', minP);
  if (maxP)  p.set('maxPrice', maxP);
  if (minYr) p.set('minYear',  minYr);
  if (maxYr) p.set('maxYear',  maxYr);
  p.set('minScore', sc);
  if (selected.size > 0) p.set('models', [...selected].join(','));

  const modelCount = selected.size > 0 ? `${selected.size} model(a)` : 'svi modeli';
  const yearStr = minYr || maxYr
    ? `${minYr || '?'}–${maxYr || 'danas'}`
    : 'bilo koje god.';
  document.getElementById('run-summary').textContent = `${modelCount} · ${minP||'0'}–${maxP||'∞'} € · ${yearStr} · skor ≥ ${sc}`;

  term.innerHTML=''; autoScroll=true; setRunning(true);

  evt = new EventSource('/api/run?'+p.toString());
  evt.onmessage = e => {
    const {type,text,time}=JSON.parse(e.data);
    termLine(type,text,time);
    if (type==='done') { evt.close(); evt=null; setRunning(false); setTimeout(loadResults,1200); }
  };
  evt.onerror = ()=>{ termLine('error','Connection lost.',null); evt.close(); evt=null; setRunning(false); setTimeout(loadResults,1200); };
});

document.getElementById('btn-stop').addEventListener('click', async ()=>{
  await fetch('/api/stop',{method:'POST'});
  if(evt){evt.close();evt=null;} setRunning(false); termLine('error','=== Stopped by user ===',null);
});

document.getElementById('btn-clear').addEventListener('click', ()=>{ term.innerHTML='<span style="color:var(--muted)">Log cleared.</span>'; });

/* ── Poll ─────────────────────────────────────────────── */
async function checkStatus() {
  try { const {isRunning:r}=await fetch('/api/status').then(x=>x.json()); if(r!==running) setRunning(r); } catch {}
}
loadResults(); checkStatus();
setInterval(checkStatus,5000); setInterval(loadResults,30000);
</script>
</body>
</html>
